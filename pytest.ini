[pytest]
# ── Asyncio ────────────────────────────────────────────────────────────────
# Fixes: "asyncio_default_fixture_loop_scope is unset" PytestDeprecationWarning
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# ── Custom marks ───────────────────────────────────────────────────────────
# Fixes: PytestUnknownMarkWarning for @pytest.mark.e2e
markers =
    e2e: End-to-end tests that require real API keys (deselect with -m "not e2e")

# ── Test discovery ─────────────────────────────────────────────────────────
testpaths = tests

# ── Default options ────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    -p no:warnings